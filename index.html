<div class="container">
    <h1>Donate via Mpesa</h1>
    <button id="donateButton">Send Money</button>
</div>

    <script>
document.getElementById('donateButton').addEventListener('click', function() {
    console.log("Donate button clicked");   
    const consumerKey = "MVcFCLR0LC70KXNANGV9FluuSEC6CSsOdOQfl3StOPjhwEVL";
    const consumerSecret = "9YOeEj0UD1Z3gB9DbjzZ64VP6vbckI3KW8crmUQvDK2S7hqfXDktvbsvsp34YemS";
    const shortcode = "9035436";
    const amount = 80000; // Amount to send
    const phoneNumber = '0743544461'; // Recipient's phone number

    fetch('/api/donate', {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json'
        },
        body: JSON.stringify({
            consumerKey,
            consumerSecret,
            shortcode,
            amount,
            phoneNumber
        })
    })
    .then(response => response.json())
    .then(data => {
        alert('Donation successful: ' + data.message);
    })
    .catch(error => {
        console.error('Error:', error);
        alert('Donation failed. Please try again.');
    });
});
        
    </script>
